# Minimal SearXNG configuration inheriting all upstream defaults
# with Grokipedia enabled.
# Place this file at: /etc/searxng/settings.yml (or the path configured in your environment)

use_default_settings: true

# ----------------------------------------------------------------------------
# Server configuration
# ----------------------------------------------------------------------------

server:
  # REQUIRED: Generate a strong secret key (minimum 32 characters)
  # Command: openssl rand -hex 32
  secret_key: "ultrasecretkey_change_me_to_a_secure_random_value"

  # Is overwritten by ${SEARXNG_PORT} and ${SEARXNG_BIND_ADDRESS}
  port: 8888
  bind_address: "127.0.0.1"
  # public URL of the instance, to ensure correct inbound links. Is overwritten
  # by ${SEARXNG_BASE_URL}.
  base_url: false  # "http://example.com/location"
  # rate limit the number of request on the instance, block some bots.
  # Is overwritten by ${SEARXNG_LIMITER}
  limiter: false
  # enable features designed only for public instances.
  # Is overwritten by ${SEARXNG_PUBLIC_INSTANCE}
  public_instance: false

  # If your instance owns a /etc/searxng/settings.yml file, then set the following
  # values there.

  # Proxy image results through SearXNG. Is overwritten by ${SEARXNG_IMAGE_PROXY}
  image_proxy: false
  # 1.0 and 1.1 are supported
  http_protocol_version: "1.0"
  # POST queries are "more secure!" but are also the source of hard-to-locate
  # annoyances, which is why GET may be better for end users and their browsers.
  # see https://github.com/searxng/searxng/pull/3619
  # Is overwritten by ${SEARXNG_METHOD}
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

brand:
  custom:
    # Custom entries rendered in the footer: [title]: [link]
    links:
      AI Empower Labs: https://www.aiempowerlabs.com

# ----------------------------------------------------------------------------
# Engine configuration – enable Grokipedia
# ----------------------------------------------------------------------------

engines:
  - name: grokipedia
    disabled: false      # Activates the engine
    inactive: false      # Removes inactivity flag (required for full activation)
    # Optional: explicit category (already set upstream)
    # categories: [general]

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    # add "list" to the array to get results in the results list
    display_type: ["infobox"]
    categories: [general]

  - name: ahmia
    disabled: true
    inactive: true

  - name: torch
    disabled: true
    inactive: true

# ----------------------------------------------------------------------------
# Optional customizations (uncomment and adjust if desired)
# ----------------------------------------------------------------------------

general:
  # Debug mode, only for development. Is overwritten by ${SEARXNG_DEBUG}
  debug: false
  # displayed name
  instance_name: "AI Empower Labs Search"
  # For example: https://example.com/privacy
  privacypolicy_url: false
  # use true to use your own donation page written in searx/info/en/donate.md
  # use false to disable the donation link
  donation_url: false
  # mailto:contact@example.com
  contact_url: false
  # record stats
  enable_metrics: true
  # expose stats in open metrics format at /metrics
  # leave empty to disable (no password set)
  # open_metrics: <password>
  open_metrics: ''

ui:
  default_theme: simple

search:
  # Filter results. 0: None, 1: Moderate, 2: Strict
  safe_search: 0

  # Existing autocomplete backends: "360search", "baidu", "brave", "dbpedia", "duckduckgo", "google", "yandex",
  # "mwmbl", "naver", "seznam", "sogou", "startpage", "stract", "swisscows", "quark", "qwant", "wikipedia" -
  # leave blank to turn it off by default.
  autocomplete: "duckduckgo"
  # remove format to deny access, use lower case.
  # formats: [html, csv, json, rss]
  formats:
    - html
    - json

# ----------------------------------------------------------------------------
# Plugin configuration - disable all plugins to avoid ClearURL fetch
# ----------------------------------------------------------------------------

plugins: {}

# ----------------------------------------------------------------------------
# Outgoing HTTP requests configuration
# ----------------------------------------------------------------------------

outgoing:
  # Increase request timeout from default 3.0s to 10.0s
  request_timeout: 10.0
  # Maximum retries on failed requests
  max_request_timeout: 15.0
  # Connection pool size
  pool_connections: 100
  # Pool maximum size
  pool_maxsize: 100
  # Enable HTTP/2 support
  http2: false
